# ENERGY STAR Portfolio Manager property mapping.
# Each site/building maps to a PM Property with a primaryFunction (an exact
# PrimaryFunctionType enum value) plus one or more Property Uses carrying use
# details. Field names, enum values, and units are grounded in the EEMSuite
# EnergyStar integration model and the ENERGY STAR "U.S. Property Types,
# Definitions, and Use Details" reference (Oct 2024). See
# docs/energystar-integration.md for the full mapping and integration notes.
# Two PM grouping models are represented: a campus (College/University parent
# with child building properties) and a multifamily property (one benchmarked
# property containing physical buildings).
energyStarProperties:
  # --- Northlake Main Campus: campus parent + per-building child properties ---
  - ref: { siteId: northlake_main_campus }
    role: campus_parent
    primaryFunction: College/University
    yearBuilt: 1965
    occupancyPercentage: 90
    isInstitutionalProperty: true
    grossFloorArea: { value: 370000, units: Square Feet }
    propertyUses:
      - function: College/University
        grossFloorAreaSqft: 370000
        useDetails:
          weeklyOperatingHours: 100
          enrollment: 9500
          numberOfFTEWorkers: 1200
          numberOfComputers: 4200
          grantDollars: 18500000
    notes: Campus benchmarking parent; the child building properties roll up to it.

  - ref: { buildingId: admin_hall }
    role: child_property
    parentSiteId: northlake_main_campus
    primaryFunction: Office
    yearBuilt: 1998
    occupancyPercentage: 95
    isInstitutionalProperty: true
    grossFloorArea: { value: 85000, units: Square Feet }
    propertyUses:
      - function: Office
        grossFloorAreaSqft: 60000
        useDetails:
          weeklyOperatingHours: 60
          numberOfWorkersOnMainShift: 180
          numberOfComputers: 200
          percentThatCanBeCooled: 100
          percentThatCanBeHeated: 100
      - function: Other - Education
        grossFloorAreaSqft: 25000
        useDetails:
          weeklyOperatingHours: 50
          numberOfWorkersOnMainShift: 20
          numberOfComputers: 60

  - ref: { buildingId: science_center }
    role: child_property
    parentSiteId: northlake_main_campus
    primaryFunction: Laboratory
    yearBuilt: 2008
    occupancyPercentage: 90
    isInstitutionalProperty: true
    grossFloorArea: { value: 120000, units: Square Feet }
    propertyUses:
      - function: Laboratory
        grossFloorAreaSqft: 80000
        useDetails:
          weeklyOperatingHours: 90
          numberOfWorkersOnMainShift: 60
          numberOfComputers: 150
      - function: Other - Education
        grossFloorAreaSqft: 40000
        useDetails:
          weeklyOperatingHours: 50
          numberOfWorkersOnMainShift: 15
          numberOfComputers: 80

  - ref: { buildingId: library }
    role: child_property
    parentSiteId: northlake_main_campus
    primaryFunction: Library
    yearBuilt: 1992
    occupancyPercentage: 90
    isInstitutionalProperty: true
    grossFloorArea: { value: 70000, units: Square Feet }
    propertyUses:
      - function: Library
        grossFloorAreaSqft: 70000
        useDetails:
          weeklyOperatingHours: 100
          numberOfWorkersOnMainShift: 25
          numberOfComputers: 120
          percentThatCanBeHeated: 100
          percentThatCanBeCooled: 100

  - ref: { buildingId: student_center }
    role: child_property
    parentSiteId: northlake_main_campus
    primaryFunction: Food Service
    yearBuilt: 2003
    occupancyPercentage: 85
    isInstitutionalProperty: true
    grossFloorArea: { value: 95000, units: Square Feet }
    propertyUses:
      - function: Food Service
        grossFloorAreaSqft: 45000
        useDetails:
          weeklyOperatingHours: 98
          numberOfWorkersOnMainShift: 40
          numberOfComputers: 30
      - function: Other - Entertainment/Public Assembly
        grossFloorAreaSqft: 50000
        useDetails:
          weeklyOperatingHours: 70
          numberOfWorkersOnMainShift: 20
          numberOfComputers: 25

  # --- Cedar Row Apartments: one multifamily property with two physical buildings ---
  - ref: { siteId: cedar_row_apartments }
    role: multifamily_property
    primaryFunction: Multifamily Housing
    yearBuilt: 2012
    occupancyPercentage: 95
    isInstitutionalProperty: true
    grossFloorArea: { value: 120000, units: Square Feet }
    propertyUses:
      - function: Multifamily Housing
        grossFloorAreaSqft: 120000
        useDetails:
          totalNumberOfResidentialLivingUnits: 124
          residentialLivingUnitsLowRise: 124
          residentialLivingUnitsMidRise: 0
          residentialLivingUnitsHighRise: 0
          numberOfBedrooms: 200
          residentPopulationType: Dedicated Student
          governmentSubsidizedHousing: "No"
          numberOfLaundryHookupsInAllUnits: 0
          numberOfLaundryHookupsInCommonAreas: 8
          percentThatCanBeHeated: 100
          percentThatCanBeCooled: 100
    notes: PM-benchmarked multifamily property; cedar_row_a and cedar_row_b are its physical buildings.

  - ref: { buildingId: cedar_row_a }
    role: building_within_property
    parentSiteId: cedar_row_apartments
    primaryFunction: Multifamily Housing
    yearBuilt: 2012
    occupancyPercentage: 95
    grossFloorArea: { value: 58000, units: Square Feet }
    propertyUses:
      - function: Multifamily Housing
        grossFloorAreaSqft: 58000
        useDetails:
          totalNumberOfResidentialLivingUnits: 60
          residentialLivingUnitsLowRise: 60
          numberOfBedrooms: 96
          residentPopulationType: Dedicated Student

  - ref: { buildingId: cedar_row_b }
    role: building_within_property
    parentSiteId: cedar_row_apartments
    primaryFunction: Multifamily Housing
    yearBuilt: 2014
    occupancyPercentage: 95
    grossFloorArea: { value: 62000, units: Square Feet }
    propertyUses:
      - function: Multifamily Housing
        grossFloorAreaSqft: 62000
        useDetails:
          totalNumberOfResidentialLivingUnits: 64
          residentialLivingUnitsLowRise: 64
          numberOfBedrooms: 104
          residentPopulationType: Dedicated Student

# Five fully-configured providers, split 3 everyday + 2 unique identities.
# Full definitions (services, units, channels, rate schedules, charges, file
# formats, environmental attributes, scenario hooks) live in providers/<id>.yaml.
providers:
  # --- 3 everyday utilities ---
  - id: valley_electric_district
    displayName: Valley Electric District
    identityClass: everyday
    providerKind: distribution_utility
    billingModel: tariff_metered
    categories: [electric]
    supplies: [monthly_bill, interval_15min, billing_demand]
    configRef: providers/valley-electric-district.yaml
  - id: sierra_gas_utility
    displayName: Sierra Gas Utility
    identityClass: everyday
    providerKind: distribution_utility
    billingModel: tariff_metered
    categories: [natural_gas]
    supplies: [monthly_bill]
    configRef: providers/sierra-gas-utility.yaml
  - id: river_city_utilities
    displayName: River City Utilities
    identityClass: everyday
    providerKind: municipal_multi_service
    billingModel: bundled_municipal
    categories: [water, sewer, stormwater]
    supplies: [monthly_bill]
    configRef: providers/river-city-utilities.yaml
    replaces: [river_city_water, capital_sewer_district]
  # --- 2 unique provider identities (not everyday utilities) ---
  - id: northlake_thermal_plant
    displayName: Northlake Thermal Plant
    identityClass: unique
    providerKind: district_energy_plant
    billingModel: internal_allocation
    categories: [chilled_water, steam]
    supplies: [interval_hourly, monthly_allocation]
    configRef: providers/northlake-thermal-plant.yaml
  - id: helios_onsite_solar
    displayName: Helios Onsite Solar
    identityClass: unique
    providerKind: onsite_generation_ppa
    billingModel: ppa_generation
    categories: [solar_generation]
    supplies: [interval_15min, monthly_ppa_invoice, rec_statement]
    configRef: providers/helios-onsite-solar.yaml

