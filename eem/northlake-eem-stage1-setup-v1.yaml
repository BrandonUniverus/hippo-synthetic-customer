securitySetup:
  sourceManifest: security/northlake-eem-security-v1.yaml
  companyGroupModel: company -> group -> user
  directUserPermissions: false
  userIdSource: users[].username
  displayNameSource: users[].displayName
  emailSource: users[].email
  disabledUserPolicy:
    createUser: true
    leaveInExpectedGroups: true
    setInactive: true
  groupCreation:
    groupIdSource: securityManifest.companies[].groups[].id or securityManifest.systemCompany.groups[].id
    groupNameSource: securityManifest.companies[].groups[].displayName or securityManifest.systemCompany.groups[].displayName
    permissionMapping: >
      Map semantic permissionProfiles to concrete DBAdmin permission tree rows
      during app-driven setup; do not grant user-level permissions directly.

validationChecklist:
  - Exactly three new positive CompanyIDs are created.
  - No Energy Hippo Implementation Support company is created.
  - System-context setup groups remain under CompanyID -1.
  - Each created company has archive interval 60, Pacific time, and UNITED STATES selected.
  - Alarm severity text and colors match the DBAdmin Definitions screen defaults.
  - Each created company has the expected Levels rows and Font Awesome icons before hierarchy nodes are created.
  - Cedar Row hierarchy, meters, bills, points, and gateway bindings are owned only by the Cedar Row company, not duplicated under Northlake University.
  - Billing accounts, GL accounts, bill validation, weather stations, bills, archives, gateways, workflows, and task schedules remain empty or default-only.
