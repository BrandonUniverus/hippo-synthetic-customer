manifestVersion: 1
id: northlake_eem_stage1_setup_v1
customerScenarioId: demo_university_v1
stage: 1
displayName: Northlake EEM Stage 1 DBAdmin Setup
purpose: >
  App-facing setup manifest for building the blank Northlake EEM system through
  DBAdmin before bills, archive data, gateways, workflows, or scheduled tasks
  are configured.

sourceReferences:
  customerInventoryWorkbook: outputs/northlake-university/northlake-organization-inventory-filled.xlsx
  sourceScenarioManifest: scenarios/demo-university-v1.yaml
  securityManifest: security/northlake-eem-security-v1.yaml

setupPrinciples:
  - Drive this through the EEM applications, not direct seed inserts.
  - Record generated EEM ids after each save; do not preassign positive CompanyIDs.
  - Use the built-in system company for implementation and support access.
  - Do not create billing accounts, GL accounts, bill validation, weather stations, bills, interval archives, gateways, workflows, or task schedules in this stage.

systemCompany:
  companyId: -1
  displayName: System
  createInDbAdmin: false
  purpose: Built-in full-system context for DB/admin/setup access.
  useFor:
    - Bootstrap and setup users.
    - EEM implementation/support users.
    - Full-system groups that should not belong to a Northlake customer company.
  groupsFromSecurityManifest:
    - id: eem_system_db_admins
      displayName: EEM System DB Admins
    - id: eem_implementation_admins
      displayName: EEM Implementation Admins
    - id: eem_gateway_stage2_preppers
      displayName: EEM Gateway Stage 2 Preppers
    - id: eem_support_readonly
      displayName: EEM Support Read Only
  usersFromSecurityManifest:
    - avery.singh
    - morgan.patel
    - taylor.bennett

deferredDbAdminSections:
  - section: Definitions / Weather Stations
    reason: Stage 1 company shell only; weather mappings are needed later when hierarchy and weather-related points exist.
  - section: Utility Accountant / Billing Accounts
    reason: Stage 1 company setup can define utility providers later, but billing accounts are Stage 2/3 setup data.
  - section: GL Accounts
    reason: GL coding is not needed until bill entry/import behavior is exercised.
  - section: Bill Validation
    reason: Validation rules are only meaningful once bill scenarios and accounts exist.
  - section: Bill Scenarios
    reason: Company_Save creates the default Actual scenario; no custom scenarios are needed yet.

companyDefaults:
  definitions:
    archiveIntervalMinutes: 60
    timeZone:
      eemTimeZoneId: 33
      uiLabel: "(GMT-08:00) Pacific Time (US & Canada); Tijuana"
      ianaName: America/Los_Angeles
    country:
      uiLabel: UNITED STATES
      databaseValue: USA
    analogAlarmSeverityDefaults:
      highAlarm:
        colorHex: "#FF0000"
        text: High-Alarm
      highWarning:
        colorHex: "#FF8000"
        text: High-Warning
      normal:
        colorHex: "#008040"
        text: Ret-Norm
      lowWarning:
        colorHex: "#0098E1"
        text: Low-Warning
      lowAlarm:
        colorHex: "#0000FF"
        text: Low-Alarm
    digitalStateColors:
      state0:
        colorHex: "#000000"
      state1:
        colorHex: "#008000"
      state2:
        colorHex: "#FF0000"
      state3:
        colorHex: "#FC8040"

