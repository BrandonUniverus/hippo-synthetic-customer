manifestVersion: 1
id: northlake_ap_gl_v1
customerScenarioId: demo_university_v1
stage: 3
roadmapPhase: 3            # docs/dream-customer/phase3-ap-gl-validation-spec.md
displayName: Northlake AP / GL / Validation Entry Plan
purpose: >
  How the Phase 3 financial data gets into EEM through the UI: GL chart, account
  AP/expense assignment + upload flags, bill validation rules, and running the AP
  approval+upload. Gaps that have NO UI are flagged as Track B (see product-gap-
  backlog.md) — those are NOT entered here; they wait on the feature build.

entryUI:
  glAccounts: { app: WPF DBAdmin, screen: "Companies -> GL Accounts (GLAccountsView)", fields: [Account Code, Description, Account Type] }
  accountAssignment: { app: WPF DBAdmin, screen: "Companies -> Bill Account Definitions", fields: ["Liability Account -> DefaultApAccountID", "Default Expense Account -> DefaultExpenseAccountID", "upload Type_Code"] }
  validationRules: { app: WPF DBAdmin, screen: "Bill Validation (BillValidationView)", fields: [Enabled, Override, Test, Commodity, Unit, "% threshold", Absolute threshold] }
  apRun: { app: Web SPA, screen: "#/reporting/APApprovalAndUpload", action: "approve valid bills -> Preview/Create Interface File (pick format)" }

sourceReferences:
  designSpec: docs/dream-customer/phase3-ap-gl-validation-spec.md
  productBacklog: docs/dream-customer/product-gap-backlog.md

glChart:                    # GLAccountsView; Account Type: 0 Assets, 1 Expenses, 2 Liabilities
  - { code: 5100-ELEC, type: 1, desc: Electricity expense }
  - { code: 5110-GAS, type: 1, desc: Natural gas expense }
  - { code: 5120-WATER, type: 1, desc: Water/sewer/stormwater expense }
  - { code: 5130-THERMAL, type: 1, desc: Chilled water / steam allocation }
  - { code: 5140-SOLAR, type: 1, desc: Solar PPA expense }
  - { code: 2000-AP, type: 2, desc: Accounts payable control }

accountUploadFlags:        # BillingAccount Type_Code: 0 No Upload, 1 AP, 2 GL, 3 AP+GL
  default: 1               # most accounts AP upload
  apPlusGl: [campus electric accounts, thermal accounts]   # Type_Code 3 (exercise GL journal)
  noUpload: [one Cedar Row account]                        # Type_Code 0 negative control
  coding: "set BI_EXpAcctID per charge line by commodity; BA_DefExpAcctID/BA_DefApAcctID as fallback"

billValidationRules:       # BillValidationView; modes 1 Bill Save + 2 Batch Test
  entries:
    - { family: cost_change_pct, threshold: "35%", floor: "$1000" }
    - { family: cost_max, threshold: "$1,000,000" }
    - { family: usage_change_pct, threshold: "40%" }
    - { family: usage_floor, threshold: "kWh 1000 / gas-water 100" }
    - { family: period_length, threshold: "26-36 days" }
    - { family: presence, threshold: "required fields / active account" }
  fixtures:
    - bills that pass all rules
    - bills that deliberately trip each family (cost spike, short period, usage zero)
    - ">=1 open validation alert on an unapproved bill (blocks AP export)"
    - "BillScenario 'Weather Normalized' for the 2 weather-normalized rules"

apRun:
  formatsUsableByHand: [export_ap (fixed-width .txt), export_ap2 (.csv)]   # the 2 built-ins
  steps: "approve IsValid bills on APApprovalAndUpload -> Create Interface File per format -> writes ExportFile + ExportLog, advances bill status"

# ---- NOT entered here: no UI exists. Build per product-gap-backlog.md, then revisit. ----
trackBDeferred:
  - { backlogItem: 2, what: "richer AP/GL/AR export formats (PeopleSoft voucher + GL journal, SAP FI, GL-UDF, AR)", reason: "no format-builder UI; dev procs" }
  - { backlogItem: 3, what: "GL user-defined fields (5 segments) + values", reason: "view not wired; until then GL coding is base account only" }
  - { backlogItem: 4, what: "accruals (open accrual + reversal pair, 2300/2301)", reason: "no UI/API at all" }

expectedAssertions:
  ref: docs/dream-customer/phase3-ap-gl-validation-spec.md#expectedassertions
  keyChecks:
    - Type_Code=0 account never exports; 1/3 accounts do
    - running export_ap / export_ap2 produces one ExportFile each, traceable to bills
    - rp_BillValidation shows deliberate failures; clean bills pass to Status 2
    - "(after Track B) one file of each richer format; GL journal balances; rp_GLAccountUDV renders; open accrual + reversal net to 0"
