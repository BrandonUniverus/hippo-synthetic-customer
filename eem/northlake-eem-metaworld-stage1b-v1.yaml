sourceGapsToResolveBeforeStage2:
  - Confirm PointTypes rows and measure type/unit ids in the restored EEMSuite seed database.
  - Expand handheld source/gateway binding to explicitly model register-reading points for Neptune and MVRS.
  - Decide whether Cedar Row Common House remains location-only or gets its own common-area meters.
  - Decide whether Student Center has chilled-water service; current source only models Student Center steam from the thermal plant.
  - Decide final weather reference owner if Northlake University should not own public station meters.
  - Add expected aggregate totals and baseline values once generated interval data exists.

validationChecklist:
  - Every source account in scenarios/demo-university-v1.yaml maps to a billing account, cost center, or PPA agreement shell.
  - Every bill image artifact maps to at least one EEM meter target.
  - Every source channel in scenarios/demo-university-v1.yaml maps to one EEM point target or to an explicit planned gap.
  - All Stage 2 gateway point bindings map to existing Stage 1B point definitions.
  - Aggregates only include members with matching unit and interval.
  - Baseline point definitions have the same unit and interval as their measured point.
  - Weather temperature points create HDD/CDD related points before weather station mapping is validated.
  - Cedar Row and Thermal Plant points are not duplicated in the Northlake University company.
