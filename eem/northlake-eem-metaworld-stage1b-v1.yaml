manifestVersion: 1
id: northlake_eem_metaworld_stage1b_v1
customerScenarioId: demo_university_v1
stage: 1b
displayName: Northlake EEM MetaWorld Stage 1B Setup
purpose: >
  App-facing target model for finishing the blank Northlake EEM system after the
  company shell exists. This stage creates the hierarchy completion, utility
  setup, billing account shells, meter shells, point definitions, weather
  station mappings, aggregate definitions, and baseline point shells needed
  before Stage 2 gateway/task configuration and Stage 3 fake consumption.

sourceReferences:
  stage1CompanySetup: eem/northlake-eem-stage1-setup-v1.yaml
  sourceScenarioManifest: scenarios/demo-university-v1.yaml
  securityManifest: security/northlake-eem-security-v1.yaml
  addressCoordinates: docs/northlake-address-coordinates.md
  customerOverview: customer-provided/northlake-university/northlake-facilities-and-utility-overview.md

eemResearchBasis:
  hierarchyNodeTypes:
    source: C:/Hippo/Git/univerus/energyhippo/EEMSuite/src/Domain/EEMSuite.Domain/Organizations/Hierarchy/Models/HierarchyNodes/HierarchyNodeTypes.cs
    supported:
      - {name: Company, internalLevelNbr: -1, use: Existing company/security boundary.}
      - {name: UserDefined, internalLevelNbr: 0, use: Portfolio, service area, and custom rollup levels.}
      - {name: Site, internalLevelNbr: 1, use: Campus, property, plant, and weather-reference groupings.}
      - {name: Location, internalLevelNbr: 2, use: Buildings, served buildings, and physical locations.}
      - {name: Meter, internalLevelNbr: 4, use: Physical meters, logical provider meters, weather stations, and sensor/controller groupings.}
      - {name: Point, internalLevelNbr: 5, use: Measured channels, derived channels, aggregates, weather indices, and baselines.}
  meterStorage:
    sourceTables: [MetaWorld_TBL, Meter]
    saveProc: Meter_Save
    keyFields:
      - ProviderID
      - RateScheduleOID
      - BA_BillingAccountID
      - SM_Code
      - SM_SerialNumber
      - SM_Multiplier
      - BillCycle
  pointStorage:
    sourceTables: [MetaWorld_TBL, PointDef_TBL, PtRelatedData_TBL]
    saveProc: Point_Save
    supportedPointTypes:
      - {name: Analog, expectedPtType: 1, use: Most interval, bill, weather, and calculated values.}
      - {name: Digital, expectedPtType: 2, use: Status/state points using company digital colors.}
      - {name: Accumulator, expectedPtType: 3, use: Register readings that produce usage deltas.}
      - {name: AccumulatorDelta, expectedPtType: 4, use: Usage delta related to an accumulator.}
      - {name: AccumulatorROC, expectedPtType: 5, use: Rate-of-change related point where enabled.}
    note: Confirm exact PointTypes rows in the restored target database before app setup.
  weatherAndIndex:
    sourceObjects:
      - C:/Hippo/Git/univerus/energyhippo/Database/EEMSuite/Procs/IndexPoints_Save.sql
      - C:/Hippo/Git/univerus/energyhippo/Database/EEMSuite/Views/wh_WeatherRelatedPoints.sql
      - C:/Hippo/Git/univerus/energyhippo/Database/EEMSuite/Tables/WeatherStationMap_TBL.sql
    behavior:
      - Weather stations are meter nodes with Weather measure type, not a separate hierarchy type.
      - Temperature points use degF or degC units.
      - IndexType 0 on a temperature point creates related HDD and CDD points.
      - HDD/CDD are linked through PtRelatedData_TBL reason types H and C.
      - WeatherStationMap_tbl maps a weather station meter to company location nodes.
  aggregates:
    sourceObjects:
      - C:/Hippo/Git/univerus/energyhippo/Database/EEMSuite/Tables/PointAggregates_TBL.sql
      - C:/Hippo/Git/univerus/energyhippo/Database/EEMSuite/Tables/PointAggregatePoints.sql
      - C:/Hippo/Git/univerus/energyhippo/Database/EEMSuite/Procs/PointAggregation_Save.sql
    behavior:
      - An aggregate is still a point node.
      - The aggregate point is registered in PointAggregates_TBL.
      - Members in PointAggregatePoints must match interval and unit.
      - Multipliers and Required flags are available per member.
  baselines:
    sourceObjects:
      - C:/Hippo/Git/univerus/energyhippo/Database/EEMSuite/Tables/PointBaseLine.sql
      - C:/Hippo/Git/univerus/energyhippo/Database/EEMSuite/Procs/PtRelatedData_Save.sql
      - C:/Hippo/Git/univerus/energyhippo/Database/EEMSuite/Procs/BaselinePoints_Lookup.sql
    behavior:
      - Baseline points are real point nodes.
      - PointBaseline assigns the baseline calculation.
      - PtRelatedData_TBL reason type B links the measured point to its baseline point.
  gatewayComponentsCovered:
    sourceProject: C:/Hippo/Git/univerus/energyhippo/EEMSuite/src/Tasks/EEMSuite.Tasks.Gateways/EEMSuite.Tasks.Gateways.csproj
    components:
      - {componentId: AcquiSuiteGateway, executorKey: gateway.acquisuite, gatewayType: ACQUISUITE}
      - {componentId: MV90Gateway, executorKey: gateway.mv90, gatewayType: MDEF}
      - {componentId: MV90Gateway, executorKey: gateway.mv90, gatewayType: MV9}
      - {componentId: BACnetGateway, executorKey: gateway.bacnet, gatewayType: BACNET}
      - {componentId: NOAAGateway, executorKey: gateway.noaa, gatewayType: NOAA}
      - {componentId: AerisWeatherGateway, executorKey: gateway.aerisweather, gatewayType: AERISWEATHER}
      - {componentId: SpinwaveGateway, executorKey: gateway.spinwave, gatewayType: SPINWAVE}
      - {componentId: FIGGateway, executorKey: gateway.fig, gatewayType: FIG}
      - {componentId: FIGGateway, executorKey: gateway.fig, gatewayType: SIEMANSREPORT}
      - {componentId: FIGGateway, executorKey: gateway.fig, gatewayType: MEDIATOR}
      - {componentId: FIGGateway, executorKey: gateway.fig, gatewayType: EATON}
      - {componentId: FIGGateway, executorKey: gateway.fig, gatewayType: XML}
      - {componentId: FIGGateway, executorKey: gateway.fig, gatewayType: FIXEDNETWORKS}
      - {componentId: FIGGateway, executorKey: gateway.fig, gatewayType: CMEP}
      - {componentId: ModbusGateway, executorKey: gateway.modbus, gatewayType: MODBUS}
      - {componentId: ODBCGateway, executorKey: gateway.odbc, gatewayType: ODBC}
      - {componentId: FakeGateway, executorKey: gateway.fake, gatewayType: FAKE}
      - {componentId: NeptuneGateway, executorKey: gateway.neptune, gatewayType: NEPTUNE}
      - {componentId: MVRSGateway, executorKey: gateway.mvrs, gatewayType: MVRS}
      - {componentId: HmrEventsPublish, executorKey: hmr.events.publish, gatewayType: HMR_EVENTS}

stageBoundaries:
  stage1aCompanyShell:
    alreadyModeledIn: eem/northlake-eem-stage1-setup-v1.yaml
    includes: [companies, definitions, levels, users, groups]
  stage1bMetaWorldSetup:
    includes:
      - Complete site/location hierarchy.
      - Utility provider and rate schedule shells.
      - Billing account, cost center, and agreement shells with no bills loaded.
      - Meter nodes and point nodes with archive interval settings but no archive rows.
      - Weather station meter nodes, HDD/CDD related points, and weather station assignments.
      - Aggregate point definitions and member selections.
      - Baseline point shells and measured-to-baseline relationships.
    excludes:
      - Bill records and bill images attached to records.
      - AnalogArchive_TBL and DigitalArchive_TBL scenario data.
      - Gateway runtime object registry rows, workflow definitions, and task schedules.
      - Enabled gateway execution.
  stage2GatewayPrep:
    includes:
      - Gateway objects, gateway nodes, and gateway point bindings.
      - Workflows and schedules created disabled.
      - Local service configuration for fake providers and local SMTP.
  stage3Consumption:
    includes:
      - Generated bills, bill images, interval archives, weather observations, gateway artifacts, task runs, and validation assertions.

ownershipRules:
  - Northlake University owns only main-campus utility, solar, weather-reference, sensor, historian, and campus aggregate points.
  - Cedar Row Apartments owns only Cedar Row property meters, points, bills, and solar data.
  - Northlake Thermal Plant owns internal chilled-water, steam, plant-controller, and thermal allocation points.
  - Cedar Row meters and points are not duplicated under Northlake University.
  - Thermal allocation meters are not duplicated under Northlake University; campus buildings can reference them in documentation and reports.
  - Weather station reference meters are created once and mapped to locations through WeatherStationMap_tbl.

