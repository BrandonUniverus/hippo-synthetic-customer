manifestVersion: 1
id: northlake_eem_security_v1
customerScenarioId: demo_university_v1
stage: 1
displayName: Northlake EEM Security Setup
purpose: >
  Fake EEM users, companies, groups, and permission intent for the Northlake
  Stage 1 pre-go-live setup. This file describes who can configure and operate
  the blank Northlake system before bills, intervals, gateways, or scheduled
  tasks are loaded.

identityPolicy:
  usernames: firstname.lastname
  passwords: not_stored_in_manifest
  emailDomains:
    customer: northlake.example.edu
    implementationPartner: energyhippo.example.com
  membershipModel: company_group_user
  systemCompanyId: -1
  directUserPermissions: false
  disabledUsersRemainInExpectedMemberships: true
  stage1TaskExecution: disabled

permissionProfiles:
  - id: company_admin
    displayName: Company Administrator
    intent: Manage company-scoped setup, users, groups, and security.
    capabilities:
      - companies.view
      - companies.manage_settings
      - users.manage
      - groups.manage
      - permissions.assign_company_scope
      - audit.view

  - id: system_db_admin
    displayName: System Database Administrator
    intent: Administer the EEM database and verify migrations in non-production environments.
    capabilities:
      - database.admin
      - database.backup_restore
      - database.migration_verify
      - application.diagnostics
      - audit.view

  - id: company_data_admin
    displayName: Company Data Administrator
    intent: Manage company data setup without full security administration.
    capabilities:
      - hierarchy.manage
      - accounts.manage
      - meters.manage
      - points.view
      - imports.audit
      - reports.view

  - id: hierarchy_setup
    displayName: Hierarchy Setup
    intent: Build and maintain sites, buildings, accounts, meters, and rollups.
    capabilities:
      - sites.manage
      - buildings.manage
      - rollups.manage
      - accounts.manage
      - meters.manage
      - providers.view

  - id: utility_setup
    displayName: Utility Setup
    intent: Configure commodities, units, providers, accounts, and meter metadata.
    capabilities:
      - commodities.manage
      - units.manage
      - providers.manage
      - utility_accounts.manage
      - meters.manage
      - bill_import_mappings.view

  - id: rates_admin
    displayName: Rates Administrator
    intent: Configure tariff schedules, rate versions, charges, and allocation rules.
    capabilities:
      - rates.manage
      - rate_charges.manage
      - rate_versions.manage
      - utility_accounts.view
      - bills.view

  - id: bill_entry
    displayName: Bill Entry
    intent: Manually enter and correct unposted bills.
    capabilities:
      - bills.create
      - bills.edit_unposted
      - bill_attachments.add
      - bills.submit_for_review
      - utility_accounts.view
    restrictions:
      - no_security_admin
      - no_rate_setup
      - no_gateway_setup

  - id: bill_import
    displayName: Bill Import
    intent: Import bill files, review import batches, and reprocess rejected rows.
    capabilities:
      - bill_imports.create
      - bill_imports.review
      - bill_imports.reprocess
      - bills.create_from_import
      - import_mappings.view
    restrictions:
      - no_security_admin
      - no_gateway_execution

  - id: report_viewer
    displayName: Report Viewer
    intent: View and export operational, cost, usage, and rollup reports.
    capabilities:
      - reports.view
      - dashboards.view
      - report_exports.create
      - bills.view
      - hierarchy.view
    restrictions:
      - read_only

  - id: sustainability_reporter
    displayName: Sustainability Reporter
    intent: View ENERGY STAR, emissions, solar, and sustainability reporting outputs.
    capabilities:
      - reports.view
      - energystar.view
      - energystar.export_prepare
      - emissions.view
      - renewable_attributes.view
    restrictions:
      - read_only_setup

  - id: audit_readonly
    displayName: Audit Read Only
    intent: Validate setup and bill history without making changes.
    capabilities:
      - companies.view
      - hierarchy.view
      - providers.view
      - rates.view
      - bills.view
      - reports.view
      - security.view
      - audit.view
    restrictions:
      - read_only

  - id: plant_operator
    displayName: Plant Operator
    intent: Maintain thermal plant meter metadata and view allocation outputs.
    capabilities:
      - plant_assets.view
      - plant_meters.manage
      - thermal_allocations.view
      - interval_status.view
      - reports.view

  - id: thermal_allocation_admin
    displayName: Thermal Allocation Administrator
    intent: Manage internal chilled-water and steam allocation rules.
    capabilities:
      - thermal_allocations.manage
      - allocation_rates.manage
      - cost_centers.manage
      - bills.view
      - reports.view

  - id: gateway_task_config_viewer
    displayName: Gateway Task Config Viewer
    intent: See gateway, workflow, and task configuration before Stage 2 enables them.
    capabilities:
      - gateways.view
      - tasks.view
      - workflows.view
      - points.view
    restrictions:
      - no_task_enable
      - no_task_run
      - no_schedule_edit

  - id: implementation_admin
    displayName: Implementation Administrator
    intent: Partner role for app-driven setup validation in local/demo environments.
    capabilities:
      - companies.view
      - hierarchy.manage
      - providers.manage
      - rates.manage
      - users.view
      - reports.view
      - gateways.view
      - tasks.view
    restrictions:
      - no_live_task_execution_in_stage1

  - id: support_readonly
    displayName: Support Read Only
    intent: Partner support role for troubleshooting without changing customer data.
    capabilities:
      - companies.view
      - hierarchy.view
      - providers.view
      - rates.view
      - bills.view
      - reports.view
      - gateways.view
      - tasks.view
      - audit.view
    restrictions:
      - read_only

systemCompany:
  id: system
  companyId: -1
  displayName: System
  companyType: built_in_system
  createInDbAdmin: false
  purpose: >
    Built-in EEM system context for DB/admin/setup users. Implementation and
    support users belong here instead of a created customer company.
  groups:
    - id: eem_system_db_admins
      displayName: EEM System DB Admins
      permissionProfiles: [system_db_admin]
      users: [avery.singh]
    - id: eem_implementation_admins
      displayName: EEM Implementation Admins
      permissionProfiles: [implementation_admin]
      users: [avery.singh, morgan.patel]
    - id: eem_gateway_stage2_preppers
      displayName: EEM Gateway Stage 2 Preppers
      permissionProfiles: [gateway_task_config_viewer]
      users: [morgan.patel]
    - id: eem_support_readonly
      displayName: EEM Support Read Only
      permissionProfiles: [support_readonly]
      users: [taylor.bennett]

