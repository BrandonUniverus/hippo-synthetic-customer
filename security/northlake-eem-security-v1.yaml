validationExpectations:
  counts:
    companiesToCreate: 3
    systemCompanyContexts: 1
    securityContexts: 4
    groups: 27
    users: 19
    activeUsers: 18
    disabledUsers: 1
  rules:
    - Every active user belongs to at least one group.
    - Every company has at least one company_admin group.
    - Bill entry users do not receive security, rate setup, or gateway setup permission profiles.
    - Report-only and audit users cannot edit hierarchy, utility setup, rates, bills, tasks, or gateways.
    - Stage 1 users can view task and gateway configuration only through gateway_task_config_viewer.
    - Disabled users can remain in source memberships but cannot authenticate.
    - At least one user has cross-company bill import access.
    - At least one user has cross-company read-only audit access.
    - At least one system-company user has DB admin access through CompanyID -1.
    - At least one group is scoped to a building subset within its company (intra-company node scope).
